{% load static %}

<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{% block title %}Frostia Games{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/main.css' %}" />
    <script src="{% static 'js/menu.js' %}" defer></script>
  </head>

  <body>
    <div class="site-shell">
      <header class="site-header">
        <a
          class="site-logo"
          href="{% url 'core:home' %}"
          aria-label="Accueil Frostia Games"
        >
          <span class="site-logo__main">FROSTIA</span>
          <span class="site-logo__accent">GAMES</span>
        </a>

        <button
          class="menu-button"
          type="button"
          aria-label="Ouvrir le menu"
          aria-expanded="false"
          aria-controls="site-sidebar"
          data-menu-button
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
      </header>

      <div class="site-layout">
        <aside class="site-sidebar" id="site-sidebar" data-sidebar>
          <nav class="site-nav" aria-label="Navigation principale">
            <a
              class="site-nav__link {% if request.resolver_match.url_name == 'home' %}is-active{% endif %}"
              href="{% url 'core:home' %}"
            >
              <span class="nav-icon">⌂</span>
              <span class="nav-label">Accueil</span>
            </a>

            <a
              class="site-nav__link {% if request.resolver_match.url_name == 'creations' %}is-active{% endif %}"
              href="{% url 'core:creations' %}"
            >
              <span class="nav-icon">✦</span>
              <span class="nav-label">Mes créations</span>
            </a>

            <a
              class="site-nav__link {% if request.resolver_match.url_name == 'projets_jouables' %}is-active{% endif %}"
              href="{% url 'core:projets_jouables' %}"
            >
              <span class="nav-icon">🎮</span>
              <span class="nav-label">Projets jouables</span>
            </a>
          </nav>
        </aside>

        <main class="site-main">
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>

    {% block scripts %}{% endblock %}
  </body>
</html>
